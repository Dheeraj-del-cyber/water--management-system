<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - AquaSmart</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">AquaSmart</a>
            <div class="nav-links" id="nav-links"></div>
        </div>
    </nav>

    <section class="container page-section">
        <div class="card auth-container">
            <h1 class="auth-title">Sign Up</h1>
            <form id="signupForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="fullName" required>
                </div>
                <div class="form-group">
                    <label>Room Number</label>
                    <input type="text" id="roomNumber" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn btn-full">Sign Up</button>
            </form>
            <p class="text-center" style="margin-top: 20px; color: var(--muted);">Already have an account? <a href="/login.html">Login</a></p>
        </div>
    </section>

    <script src="/js/main.js"></script>
    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value;
            const roomNumber = document.getElementById('roomNumber').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                const data = await apiCall('/auth/signup', 'POST', { fullName, roomNumber, email, password });
                if(data.role === 'admin') window.location.href = '/admin.html';
                else window.location.href = '/dashboard.html';
            } catch (error) {
                alert(error.message);
            }
        });
    </script>
</body>
</html>
