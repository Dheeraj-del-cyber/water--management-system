<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - AquaSmart</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">AquaSmart</a>
            <div class="nav-links" id="nav-links"></div>
        </div>
    </nav>

    <div class="container page-section">
        <div class="card">
            <h1 class="section-heading text-center">Conservation Leaderboard</h1>
            <div class="table-responsive">
                <table id="leaderboardTable">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Name</th>
                            <th>Room</th>
                            <th>Eco Points</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Data injected via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const users = await apiCall('/api/leaderboard');
                const tbody = document.querySelector('#leaderboardTable tbody');
                tbody.innerHTML = users.map((u, index) => `
                    <tr>
                        <td><strong>#${index + 1}</strong></td>
                        <td>${u.fullName}</td>
                        <td>${u.roomNumber}</td>
                        <td style="color: var(--success); font-weight: bold;">${u.ecoPoints}</td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error(error);
            }
        });
    </script>
</body>
</html>
